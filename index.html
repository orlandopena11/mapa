<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Inmobiliario - Estilo Zillow</title>
    
    <!-- MAPA: Estilos CSS Oficiales de Leaflet (Ruta Completa) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    
    <!-- MAPA: Motor JavaScript Oficial de Leaflet (Ruta Completa) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    
    <!-- BASE DE DATOS: Lector de Google Sheets (PapaParse Ruta Completa) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background-color: #f6f6f9; overflow: hidden; }
        .pantalla-zillow { display: flex; height: 100vh; width: 100vw; position: relative; }
        
        #mapa { width: 55%; height: 100%; z-index: 1; }
        
        #panel-propiedades { width: 45%; height: 100%; overflow-y: auto; background: #ffffff; display: flex; flex-direction: column; z-index: 2; border-left: 1px solid #e0e0e0; }
        .barra-superior { padding: 20px; border-bottom: 1px solid #eeeeee; background: #ffffff; }
        .barra-superior h2 { margin: 0; font-size: 22px; color: #2a2a2a; }
        .barra-superior p { margin: 5px 0 0 0; color: #666; font-size: 14px; }
        
        .grid-tarjetas { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .tarjeta-casa { background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; transition: all 0.3s ease; display: flex; flex-direction: column; position: relative; }
        .tarjeta-casa:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-color: #006aff; }
        
        .badge { position: absolute; top: 10px; left: 10px; background: #006aff; color: white; padding: 4px 10px; font-size: 11px; font-weight: bold; border-radius: 20px; text-transform: uppercase; z-index: 3; }

        .corazon-favorito { position: absolute; top: 10px; right: 10px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 4; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.7)); transition: transform 0.2s; }
        .corazon-favorito:hover { transform: scale(1.2); color: #ff3b30; }

        .contenedor-foto { width: 100%; height: 140px; background: #e2e8f0; }
        .contenedor-foto img { width: 100%; height: 100%; object-fit: cover; }
        
        .datos-casa { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .precio { font-size: 22px; font-weight: 800; color: #2a2a2a; margin: 0 0 5px 0; }
        .caracteristicas { font-size: 13px; color: #4a4a4a; margin: 0 0 5px 0; }
        .direccion-texto { font-size: 13px; color: #666; margin: 0 0 12px 0; line-height: 1.3; }
        .titulo-propiedad { font-size: 12px; font-weight: 600; color: #006aff; margin: 0 0 5px 0; text-transform: uppercase; }
        
        .btn-ver-contacto { width: 100%; background: #ffffff; color: #006aff; border: 1px solid #006aff; padding: 10px 0; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .btn-ver-contacto:hover { background: #f0f6ff; }

        .pantalla-bloqueo { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.5); z-index: 9999; justify-content: center; align-items: center; }
        .caja-login { background: white; padding: 30px; width: 90%; max-width: 380px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; text-align: center; }
        .btn-cerrar { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; color: #666; }
        .logo-zillow-falso { font-size: 28px; font-weight: 800; color: #006aff; margin-bottom: 5px; letter-spacing: -1px; }
        .caja-login h3 { margin: 0 0 20px 0; font-size: 22px; color: #2a2a2a; }
        .caja-login label { display: block; text-align: left; font-size: 12px; font-weight: 700; color: #2a2a2a; margin-bottom: 5px; }
        .caja-login input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; margin-bottom: 15px; }
        .btn-continuar { width: 100%; background: #8bb2f9; color: white; border: none; padding: 12px 0; font-size: 15px; font-weight: 600; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        .btn-redes { width: 100%; background: white; border: 1px solid #ccc; padding: 10px 0; font-size: 14px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; text-align: center; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="pantalla-zillow">
    <!-- LIENZO DEL MAPA -->
    <div id="mapa"></div>
    
    <!-- PANEL DE PROPIEDADES -->
    <div id="panel-propiedades">
        <div class="barra-superior">
            <h2>Propiedades Disponibles</h2>
            <p id="contador-propiedades">Sincronizando con Google Sheets...</p>
        </div>
        <div id="contenedor-tarjetas" class="grid-tarjetas"></div>
    </div>
</div>

<!-- VENTANA FLOTANTE DE INICIO DE SESIÓN PERSONALIZADA -->
<div id="mi-modal-login" class="pantalla-bloqueo">
    <div class="caja-login">
        <button class="btn-cerrar" onclick="cerrarVentanaLogin()">✕</button>
        
        <!-- TU LOGO REAL DE INMOBILIARIA ORLANDO PEÑA -->
        <!--<div style="width: 100%; display: flex; justify-content: center; margin-bottom: 20px;">
            <img src="logo.jpg" alt="Inmobiliaria Orlando Peña" style="width: 180px; height: auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        </div>-->
        
        <!-- TU LOGO CORPORATIVO REDUCIDO A UN TERCIO EXACTO -->
        <div style="width: 100%; display: flex; justify-content: center; margin-bottom: 15px;">
            <img src="logo.jpg" alt="Inmobiliaria Orlando Peña" style="width: 100px; height: 100px; object-fit: contain; border-radius: 6px;">
        </div>

        
        <h3 style="margin: 0 0 15px 0; font-size: 20px; color: #2a2a2a; text-align: left; font-weight: 700;">Iniciar sesión</h3>
        
        <label>Correo Electrónico *</label>
        <input type="email" id="input-usuario-email" placeholder="Introduce tu correo electrónico">
        
        <label style="margin-top: 10px;">Contraseña *</label>
        <input type="password" id="input-usuario-pass" placeholder="Introduce tu contraseña" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; margin-bottom: 15px;">
        
        <button class="btn-continuar" id="btn-autenticar" onclick="procesarAccesoUsuario()">Continuar</button>
        
        <div style="font-size:12px; color:#666; margin: 15px 0;">Ó</div>
        
        <!-- Botón de Google en Español -->
        <button class="btn-redes">🌐 Continuar con Google</button>
        
        <!-- Enlace Legal en Español -->
        <p style="font-size: 11px; color: #666; margin: 20px 0 0 0; line-height: 1.4; text-align: center;">
            Al continuar, acepto los <span style="color: #006aff; text-decoration: underline; cursor: pointer;">términos de uso</span> y la <span style="color: #006aff; text-decoration: underline; cursor: pointer;">política de privacidad</span> de Inmobiliaria Orlando Peña.
        </p>
    </div>
</div>

<script>
    // Declaramos las variables de sesión que el navegador no encuentra
    let usuarioAutenticado = false;
    let correoUsuarioLogueado = "";

    // Variables globales
    let map;
    let datosPropiedades = [];
    let datosUbicaciones = [];
    let propiedadesCombinadas = [];
    let marcadoresEnPantalla = [];
    
    // 1. Configuración de credenciales de Supabase
    // Reemplaza los textos entre comillas por tus llaves reales del bloc de notas
    const supabaseUrl = "https://aohizylvnnrjhgplsods.supabase.co";
    const supabaseKey = "sb_publishable_uNtOayIxxDaxozSL4uA7Qw_j8adfYS1";
    
    // Encender el cliente oficial de Supabase
    supabase = window.supabase.createClient(supabaseUrl, supabaseKey);



    // TUS ENLACES DE GOOGLE SHEETS
    const urlPropiedades = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOM28CiE-vtQQSFatI6Q0e_Gdoptt9GebaI6e7Ji4gi5bIVSobS9lUZwaOiVDxsTFv1Gm2oeJqQqze/pub?gid=1894444823&single=true&output=csv";
    const urlUbicaciones = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOM28CiE-vtQQSFatI6Q0e_Gdoptt9GebaI6e7Ji4gi5bIVSobS9lUZwaOiVDxsTFv1Gm2oeJqQqze/pub?gid=1567579303&single=true&output=csv";

    // Inicializar el mapa asegurando que el DOM esté listo
    function inicializarMapa() {
        map = L.map('mapa', { zoomControl: false }).setView([-12.122, -77.028], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Mudar los controles del zoom a la esquina superior derecha de forma segura
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Escuchar el zoom y arrastre del usuario
        map.on('moveend', renderizarMapaZillow);


        // Disparar la descarga de datos
        cargarTodo();
    }

    // Descarga de datos
    function cargarTodo() {
        Papa.parse(urlPropiedades, {
            download: true,
            header: true,
            complete: function(resProp) {
                datosPropiedades = resProp.data;
                
                Papa.parse(urlUbicaciones, {
                    download: true,
                    header: true,
                    complete: function(resUbic) {
                        datosUbicaciones = resUbic.data;
                        relacionarTablas();
                    }
                });
            }
        });
    }
    // El "JOIN": Cruzar tus tablas corrigiendo las comas por puntos en las coordenadas
    function relacionarTablas() {
        propiedadesCombinadas = [];

        datosPropiedades.forEach(prop => {
            const uMatch = datosUbicaciones.find(u => u.ubicacion_id === prop.ubicacion_id_fk);

            if (uMatch && uMatch.latitud && uMatch.longitud) {
                propiedadesCombinadas.push({
                    id: prop.propiedad_id,
                    titulo: prop.tipo_propiedad || "Inmueble",
                    precio: prop.precio_base ? parseFloat(prop.precio_base.toString().replace(',', '.')) : 0, 
                    foto: prop.foto_principal || "",
                    habitaciones: prop.habitaciones || "0",
                    banos: prop.banos || "0",
                    area: prop.area_construida || "0",
                    direccion: prop.direccion || "Dirección no disponible",
                    lat: parseFloat(uMatch.latitud.toString().replace(',', '.')),
                    lng: parseFloat(uMatch.longitud.toString().replace(',', '.')),
                    distrito: uMatch.distrito || "Lima",
                    tipo: prop.tipo_propiedad || "Venta"
                });
            }
        });

        renderizarMapaZillow();
    }

    // 5. Renderizar la pantalla estilo Zillow (Pines + Tarjetas comerciales inteligentes)
    function renderizarMapaZillow() {
        const contenedor = document.getElementById('contenedor-tarjetas');
        const txtContador = document.getElementById('contador-propiedades');
        
        if (!contenedor || !txtContador) return;
        contenedor.innerHTML = ''; 

        marcadoresEnPantalla.forEach(m => map.removeLayer(m));
        marcadoresEnPantalla = [];

        const limitesVisuales = map.getBounds();
        let contadorVisual = 0;

        propiedadesCombinadas.forEach(casa => {
            const coordenada = L.latLng(casa.lat, casa.lng);

            if (limitesVisuales.contains(coordenada)) {
                contadorVisual++;

                const precioFormateado = casa.precio > 0 ? "$ " + casa.precio.toLocaleString('en-US') : "Consulte";

                const marcador = L.marker([casa.lat, casa.lng]).addTo(map)
                    .bindPopup(`<b>Código: ${casa.id}</b><br><b style="color:#006aff;">${precioFormateado}</b>`);
                marcadoresEnPantalla.push(marcador);

                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-casa';
                
                const imagenFinal = casa.foto ? casa.foto : "https://unsplash.com";

                // Lógica de candado de seguridad: si está autenticado, muestra los datos comerciales reales
                const estiloCorazon = usuarioAutenticado ? "color: #ff3b30;" : "color: white;";
                const textoBotonContacto = usuarioAutenticado ? "📞 Contactar: 999-999-999" : "Ver datos de contacto";
                const iconoCorazon = usuarioAutenticado ? "♥" : "♡";

                tarjeta.innerHTML = `
                    <div class="badge">${casa.tipo}</div>
                    <button class="corazon-favorito" style="${estiloCorazon}" onclick="abrirVentanaLogin()">${iconoCorazon}</button>
                    <div class="contenedor-foto">
                        <img src="${imagenFinal}" alt="">
                    </div>
                    <div class="datos-casa">
                        <div>
                            <p class="precio">${precioFormateado}</p>
                            <p class="caracteristicas"><b>${casa.habitaciones}</b> bds | <b>${casa.banos}</b> ba | <b>${casa.area}</b> m²</p>
                            <p class="direccion-texto">${casa.direccion}, ${casa.distrito}</p>
                            <p class="titulo-propiedad">Código: ${casa.id}</p>
                        </div>
                        <button class="btn-ver-contacto" onclick="abrirVentanaLogin()">${textoBotonContacto}</button>
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            }
        });

        txtContador.innerText = `${contadorVisual} propiedades encontradas en esta zona`;
    }

    // Arreglo para guardar los códigos de las propiedades favoritas del usuario de forma independiente
    let favoritosUsuario = [];

    // Función inteligente para controlar los corazones individuales
    function alternarFavorito(idPropiedad) {
        if (!usuarioAutenticado) {
            abrirVentanaLogin();
            return;
        }

        const index = favoritosUsuario.indexOf(idPropiedad);
        if (index === -1) {
            favoritosUsuario.push(idPropiedad); // Añade a favoritos si no estaba
            alert("Propiedad " + idPropiedad + " añadida a tus favoritos.");
        } else {
            favoritosUsuario.splice(index, 1); // Quita de favoritos si ya estaba
            alert("Propiedad " + idPropiedad + " eliminada de tus favoritos.");
        }

        // Refrescar los corazones en la pantalla de inmediato
        renderizarMapaZillow();
    }

    // Abrir y cerrar la ventana flotante
    function abrirVentanaLogin() {
        if (usuarioAutenticado) {
            alert("Ya iniciaste sesión como: " + correoUsuarioLogueado);
            return;
        }
        document.getElementById('mi-modal-login').style.display = 'flex';
    }

    function cerrarVentanaLogin() {
        document.getElementById('mi-modal-login').style.display = 'none';
    }

    // Escuchador automático: Detecta si el usuario viene regresando de confirmar su correo electrónico
    async function comprobarSesionAlCargar() {
        // Inicializar el mapa de Lima primero
        inicializarMapa();

        // Revisar si Supabase tiene una sesión activa (porque hizo clic en su correo)
        const { data: { session } } = await supabase.auth.getSession();

        if (session && session.user) {
            usuarioAutenticado = true;
            correoUsuarioLogueado = session.user.email;
            
            // Actualizar el estado verificado en tu tabla relacional de forma automática
            await supabase
                .from('usuario_autenticado')
                .update({ verificado: true })
                .eq('correo', session.user.email);

            alert("¡Tu correo ha sido confirmado con éxito! Bienvenido a Inmobiliaria Orlando Peña.");
            renderizarMapaZillow();
        }
    }

    // Modificamos el arranque oficial de la página para que use el comprobador de correo
    window.onload = comprobarSesionAlCargar;


    // EL CEREBRO DEL BOTÓN: Procesar el Ingreso o Registro simulado del usuario
    async function procesarAccesoUsuario() {
    const email = document.getElementById('input-usuario-email').value.trim();
    const pass = document.getElementById('input-usuario-pass').value.trim();

    if (email === "" || pass === "") {
        alert("Por favor, completa todos los campos obligatorios (*)");
        return;
    }

    try {
        // 1. Intentar iniciar sesión primero (Si ya existe y ya confirmó su correo)
        const { data: dataLogin, error: errorLogin } = await supabase.auth.signInWithPassword({
            email: email,
            password: pass,
        });

        // Caso A: El usuario ya existe y sus credenciales son correctas
        if (!errorLogin && dataLogin.user) {
            usuarioAutenticado = true;
            correoUsuarioLogueado = email;
            alert("¡Acceso exitoso! Bienvenido de vuelta a Inmobiliaria Orlando Peña.");
            cerrarVentanaLogin();
            renderizarMapaZillow();
            return;
        }

        // Si el error es que debe confirmar el correo, detenemos el proceso con el aviso
        if (errorLogin && errorLogin.message.includes("Email not confirmed")) {
            alert("Tu correo aún no ha sido verificado. Por favor, revisa tu bandeja de entrada y haz clic en el enlace de confirmación enviado por Inmobiliaria Orlando Peña.");
            return;
        }

        // Caso B: Si las credenciales están mal pero el usuario existe, avisamos
        if (errorLogin && errorLogin.status === 400 && !errorLogin.message.includes("Invalid login credentials")) {
            alert("Error: " + errorLogin.message);
            return;
        }

        // 2. Si no pudo loguearse porque NO existe, lo registramos y Supabase le manda el correo real en el acto
        const { data: dataRegistro, error: errorRegistro } = await supabase.auth.signUp({
            email: email,
            password: pass,
        });

        if (errorRegistro) throw errorRegistro;

        // Si se creó con éxito y está esperando confirmación
        if (dataRegistro.user && dataRegistro.session === null) {
            alert("¡Registro recibido! Inmobiliaria Orlando Peña ha enviado un enlace de confirmación a: " + email + ". Por favor, revisa tu bandeja de entrada (o carpeta de Spam) para activar tu cuenta.");
            cerrarVentanaLogin();
        }

    } catch (error) {
        console.error("Error del sistema:", error);
        alert("Contraseña incorrecta o inconveniente con el servidor: " + error.message);
    }
        // Actualizar la pantalla de inmediato para desbloquear los datos de contacto
        renderizarMapaZillow();
    }

    
    // Arrancar toda la aplicación al cargar la página
    window.onload = inicializarMapa;
</script>
</body>
</html>
