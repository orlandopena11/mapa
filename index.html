<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Inmobiliario - Estilo Zillow</title>
    
        <!-- MAPA: Estilos CSS Oficiales de Leaflet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <!-- MAPA: Motor JavaScript Oficial de Leaflet -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>    
    <!-- BASE DE DATOS: Lector de Google Sheets (PapaParse) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- BASE DE DATOS: Cliente Oficial de Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>


    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background-color: #f6f6f9; overflow: hidden; }
        .pantalla-zillow { display: flex; height: 100vh; width: 100vw; position: relative; }
        
        #mapa { width: 55%; height: 100%; z-index: 1; }
        
        #panel-propiedades { width: 45%; height: 100%; overflow-y: auto; background: #ffffff; display: flex; flex-direction: column; z-index: 2; border-left: 1px solid #e0e0e0; }
        .barra-superior { padding: 20px; border-bottom: 1px solid #eeeeee; background: #ffffff; }
        .barra-superior h2 { margin: 0; font-size: 22px; color: #2a2a2a; }
        .barra-superior p { margin: 5px 0 0 0; color: #666; font-size: 14px; }
        
        .grid-tarjetas { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .tarjeta-casa { background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; transition: all 0.3s ease; display: flex; flex-direction: column; position: relative; }
        .tarjeta-casa:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-color: #006aff; }
        
        .badge { position: absolute; top: 10px; left: 10px; background: #006aff; color: white; padding: 4px 10px; font-size: 11px; font-weight: bold; border-radius: 20px; text-transform: uppercase; z-index: 3; }

        .corazon-favorito { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 24px; cursor: pointer; z-index: 4; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.7)); transition: transform 0.2s; }
        .corazon-favorito:hover { transform: scale(1.2); }

        .contenedor-foto { width: 100%; height: 140px; background: #e2e8f0; cursor: pointer; }
        .contenedor-foto img { width: 100%; height: 100%; object-fit: cover; }
        
        .datos-casa { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .precio { font-size: 22px; font-weight: 800; color: #2a2a2a; margin: 0 0 5px 0; }
        .caracteristicas { font-size: 13px; color: #4a4a4a; margin: 0 0 5px 0; }
        .direccion-texto { font-size: 13px; color: #666; margin: 0 0 12px 0; line-height: 1.3; }
        .titulo-propiedad { font-size: 12px; font-weight: 600; color: #006aff; margin: 0 0 5px 0; text-transform: uppercase; }
        
        .btn-ver-contacto { width: 100%; background: #ffffff; color: #006aff; border: 1px solid #006aff; padding: 10px 0; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .btn-ver-contacto:hover { background: #f0f6ff; }

        .pantalla-bloqueo { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.5); z-index: 9999; justify-content: center; align-items: center; }
        .caja-login { background: white; padding: 30px; width: 90%; max-width: 340px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; text-align: center; }
        .btn-cerrar { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; color: #666; }
        
        .caja-login h3 { margin: 0 0 20px 0; font-size: 22px; color: #2a2a2a; }
        .caja-login label { display: block; text-align: left; font-size: 12px; font-weight: 700; color: #2a2a2a; margin-bottom: 5px; }
        .caja-login input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; margin-bottom: 15px; }
        .btn-continuar { width: 100%; background: #006aff; color: white; border: none; padding: 12px 0; font-size: 15px; font-weight: 600; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        .btn-redes { width: 100%; max-width: 100%; height: 44px; display: flex; align-items: center; justify-content: center; background: white; border: 1px solid #ccc; border-radius: 8px; font-family: 'Open Sans', sans-serif; font-size: 14px; font-weight: 600; color: #2a2a2a; margin: 12px 0; cursor: pointer; }
        .btn-redes:hover { background-color: #f7f7f7; }
    </style>
</head>
<body>

<div class="pantalla-zillow">
    <div id="mapa"></div>
    <div id="panel-propiedades">
        <div class="barra-superior">
            <h2>Propiedades Disponibles</h2>
            <p id="contador-propiedades">Sincronizando con Google Sheets...</p>
        </div>
        <div id="contenedor-tarjetas" class="grid-tarjetas"></div>
    </div>
</div>

<!-- VENTANA FLOTANTE DE INICIO DE SESIÓN -->
<div id="mi-modal-login" class="pantalla-bloqueo">
    <div class="caja-login">
        <button class="btn-cerrar" onclick="cerrarVentanaLogin()">✕</button>
        
        <div style="width: 100%; display: flex; align-items: flex-end; justify-content: flex-start; padding-left: 15px; margin-bottom: 25px; gap: 14px;">
            <img src="logo.jpg" alt="Inmobiliaria Orlando Peña" style="width: 55px; height: 55px; object-fit: contain; border-radius: 6px; display: block;">
            <div style="display: flex; flex-direction: column; font-family: 'Open Sans', sans-serif; line-height: 1.1; padding-bottom: 2px;">
                <span style="font-size: 19px; font-weight: 700; color: #002E50;">Inmobiliaria</span>
                <span style="font-size: 19px; font-weight: 700; color: #002E50;">en Surco</span>
            </div>
        </div>

        <h3 style="margin: 0 0 15px 0; font-size: 20px; color: #2a2a2a; text-align: left; font-weight: 700;">Iniciar sesión</h3>
        
        <label>Correo Electrónico *</label>
        <input type="email" id="input-usuario-email" placeholder="Introduce tu correo electrónico">
        
        <label style="margin-top: 10px;">Contraseña *</label>
        <input type="password" id="input-usuario-pass" placeholder="Introduce tu contraseña" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; margin-bottom: 15px;">
        
        <button class="btn-continuar" id="btn-autenticar" onclick="procesarAccesoUsuario()">Continuar</button>
        
        <div style="font-size:12px; color:#666; margin: 15px 0;">Ó</div>
        
        <button class="btn-redes" id="btn-google">
            <svg viewBox="0 0 24 24" style="width: 18px; height: 18px; margin-right: 12px;" xmlns="http://w3.org"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>Continuar con Google
        </button>

        <button class="btn-redes" id="btn-facebook">
            <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; margin-right: 12px;" xmlns="http://w3.org"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/></svg>Continuar con Facebook
        </button>
               
        <div style="width: 100%; text-align: center; margin-top: 25px; border-top: 1px solid #e6e6e6; padding-top: 15px;">
            <p style="font-family: 'Open Sans', sans-serif; font-size: 11px; color: #666666; line-height: 1.4; margin: 0 10px;">
                Al continuar, yo acepto los <a href="https://github.io" target="_blank" style="color: #006aff; text-decoration: underline; font-weight: 600;">Términos de uso</a> de Inmobiliaria en Surco.
            </p>
        </div>
    </div>
</div>

    <script>
    // Variables globales de sesión y estado comercial
    let usuarioAutenticado = false;
    let correoUsuarioLogueado = "";
    let favoritosUsuario = []; // Guardará los códigos guardados en Google Sheets
    
    let map;
    let propiedadesCombinadas = [];
    let marcadoresEnPantalla = [];
    
    // ⚠️ REEMPLAZA ESTO POR TU URL /exec GENERADA EN GOOGLE APPS SCRIPT
    const urlMiScriptGoogle = "https://script.google.com/macros/s/AKfycbzM8WDtQkytj7SNVCQ1JMbBTuIeepVUwFs3f0CQ-dJrfm2vOd5BeSKQ9H1YKRrwfpaJjQ/exec";
    
    // Credenciales de Supabase Auth
    const supabaseUrl = "https://aohizylvnnrjhgplsods.supabase.co";
    const supabaseKey = "sb_publishable_uNtOayIxxDaxozSL4uA7Qw_j8adfYS1";
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    
    document.getElementById('btn-google').addEventListener('click', async () => {
        await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { 
                redirectTo: 'https://orlandopena11.github.io/mapa/',
                // 🌟 REGLA DE ORO: Fuerza a Google a mostrar la pantalla oficial de selección de cuentas siempre
                queryParams: { prompt: 'select_account' } 
            }
        });
    });

    document.getElementById('btn-facebook').addEventListener('click', async () => {
        await supabaseClient.auth.signInWithOAuth({
            provider: 'facebook',
            options: { 
                redirectTo: 'https://orlandopena11.github.io/mapa/',
                // 🌟 REGLA DE ORO: Fuerza a Facebook a exigir la reautenticación manual del interesado siempre
                queryParams: { auth_type: 'reauthenticate' } 
            }
        });
    });


    // =========================================================================
    // CONTROLADOR INTEGRADO DE SESIÓN AL CARGAR LA WEB
    // =========================================================================
    async function comprobarSesionAlCargar() {
        inicializarMapa();

        // Verificamos si Supabase tiene sesión guardada en caché local
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (session && session.user) {
            verificarEstadoYRolUsuario(session.user.email);
        } else {
            forzarCierreDeInterfazPorSeguridad();
        }
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session && session.user) {
            if (!usuarioAutenticado) verificarEstadoYRolUsuario(session.user.email);
        } 
        else if (event === 'SIGNED_OUT') {
            usuarioAutenticado = false;
            correoUsuarioLogueado = "";
            favoritosUsuario = [];
            renderizarMapaZillow();
        } 
        else {
            usuarioAutenticado = false;
            renderizarMapaZillow();
        }
    });

    document.addEventListener("DOMContentLoaded", comprobarSesionAlCargar);

    function inicializarMapa() {
        map = L.map('mapa', { zoomControl: false }).setView([-12.122, -77.028], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);
        
        map.on('moveend', renderizarMapaZillow);
        cargarDatosDesdeAppsScript();
    }

    // =========================================================================
    // LECTURA DE DATOS MEDIANTE LA API RELACIONAL (doGet JSONP)
    // =========================================================================       
    function cargarDatosDesdeAppsScript() {
    var script = document.createElement('script');
    script.src = urlMiScriptGoogle + "?callback=procesarDatosDelMotor";
    document.body.appendChild(script);
}
        window.procesarDatosDelMotor = function(data) {
        if (data.error) {
            console.error("Error del motor:", data.error);
            return;
        }
        propiedadesCombinadas = data.propiedades.map(prop => ({
            id: prop.id,
            titulo: prop.titulo,
            precio: prop.precio_base,
            foto: prop.foto_principal,
            habitaciones: prop.habitaciones,
            banos: prop.banos,
            area: prop.area_construida,
            direccion: prop.geo.direccion + ", " + prop.geo.distrito,
            lat: prop.geo.latitud,
            lng: prop.geo.longitud,
            tipo: prop.tipo_anuncio,
            // 🌟 CAPTURA INTEGRADA DE TELÉFONOS (JERARQUÍA COMERCIAL)
            telefonoAgente: prop.telefono_agente,    // Número del Agente Inmobiliario
            telefonoPropietario: prop.telefono_dueno // Número del Propietario Directo
        }));

        renderizarMapaZillow();
    };


            // =========================================================================
    // RENDERIZADOR COMERCIAL DINÁMICO
    // =========================================================================
    function renderizarMapaZillow() {
        const contenedor = document.getElementById('contenedor-tarjetas');
        const txtContador = document.getElementById('contador-propiedades');
        if (!contenedor || !txtContador) return;
        contenedor.innerHTML = ''; 

        marcadoresEnPantalla.forEach(m => map.removeLayer(m));
        marcadoresEnPantalla = [];

        const limitesVisuales = map.getBounds();
        let contadorVisual = 0;

        propiedadesCombinadas.forEach(casa => {
            const coordenada = L.latLng(casa.lat, casa.lng);

            if (limitesVisuales.contains(coordenada)) {
                contadorVisual++;
                const precioFormateado = casa.precio > 0 ? "$ " + casa.precio.toLocaleString('en-US') : "Consulte";

                const marcador = L.marker([casa.lat, casa.lng]).addTo(map)
                    .bindPopup(`<b>Código: ${casa.id}</b><br><b style="color:#006aff;">${precioFormateado}</b>`);
                marcadoresEnPantalla.push(marcador);

                // Evaluar si es favorito y color de corazón
                const esFavorito = favoritosUsuario.includes(casa.id.toString());
                const colorCorazon = usuarioAutenticado ? (esFavorito ? '#d92323' : '#757575') : '#b0bec5';

                let textoBotonContacto = "Ver datos de contacto";
                let accionClickBoton = "abrirVentanaLogin()";

                // 🌟 LÓGICA COMERCIAL INTELIGENTE DE CONTACTO EN SURCO
                if (usuarioAutenticado) {
                    let telefonoFinal = "";
                    let tipoContacto = "";

                    // REGLA A: Si la propiedad tiene un Agente Inmobiliario asignado, él tiene la prioridad absoluta
                    if (casa.telefonoAgente && casa.telefonoAgente.toString().trim() !== "") {
                        telefonoFinal = casa.telefonoAgente.toString().trim();
                        tipoContacto = "Agente Inmobiliario";
                    } 
                    // REGLA B: Si NO tiene agente, se muestra directamente el número del propietario/dueño auténtico
                    else if (casa.telefonoPropietario && casa.telefonoPropietario.toString().trim() !== "") {
                        telefonoFinal = casa.telefonoPropietario.toString().trim();

      if (casa.telefono && casa.telefono !== "Ver datos de contacto" && casa.telefono !== "Sin teléfono") {
        textoBotonContacto = `📞 Contactar: ${casa.telefono}`;
        accionClickBoton = `alert('Número de contacto: ${casa.telefono}')`;
      } else {
        textoBotonContacto = "📞 Solicitar Teléfono";
        accionClickBoton = `alert('Esta propiedad no registra teléfonos activos. Un asesor se comunicará contigo.')`;
      }

                        
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-casa';
                const imagenFinal = casa.foto ? casa.foto : "https://unsplash.com";

                tarjeta.innerHTML = `
                    <div class="badge">${casa.tipo}</div>
                    <button class="corazon-favorito" onclick="alternarFavoritoReal('${casa.id}')" style="color: ${colorCorazon}; position: absolute; top: 12px; right: 12px; background: none; border: none; cursor: pointer; font-size: 26px; z-index: 999; filter: drop-shadow(1px 0px 0px #fff) drop-shadow(-1px 0px 0px #fff); line-height: 1;">❤</button>
                    <div class="contenedor-foto">
                        <img src="${imagenFinal}" alt="">
                    </div>
                    <div class="datos-casa">
                        <div>
                            <p class="precio">${precioFormateado}</p>
                            <p class="caracteristicas"><b>${casa.habitaciones}</b> bds | <b>${casa.banos}</b> ba | <b>${casa.area}</b> m²</p>
                            <p class="direccion-texto">${casa.direccion}</p>
                            <p class="titulo-propiedad">Código: ${casa.id}</p>
                        </div>
              <button class="btn-ver-contacto" onclick="${accionClickBoton}">${textoBotonContacto}</button>
          </div>
      `;

      contenedor.appendChild(tarjeta);
    }
  });

  txtContador.innerText = `${contadorVisual} propiedades encontradas en esta zona`;
}


    // =========================================================================
    // COMUNICACIÓN ASÍNCRONA CON EL BACKEND DE GOOGLE SHEETS (doPost)
    // =========================================================================
    function verificarEstadoYRolUsuario(emailUsuario) {
        fetch(urlMiScriptGoogle, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ accion: "verificar_estado_usuario", email: emailUsuario })
        })
        .then(res => res.json())
        .then(async (data) => {
            // 🌟 REGLA 1: SI ESTÁ ACTIVO EN LA SHEET -> Conceder todos los privilegios comerciales
            if (data.success && data.estado_cuenta.toString().toLowerCase().trim() === "activo") {
                usuarioAutenticado = true;
                correoUsuarioLogueado = emailUsuario;
                favoritosUsuario = data.favoritos.map(id => id.toString());
                cerrarVentanaLogin();
                renderizarMapaZillow();
            } 
            // 🔒 REGLA 2: SI EL ADMINISTRADOR LO SUSPENDIÓ -> Alerta y expulsión inmediata del sistema
            else if (data.estado_cuenta === "suspendido") {
                alert("Tu cuenta se encuentra suspendida por el administrador. No tienes acceso a los datos de contacto.");
                await forzarCierreDeInterfazPorSeguridad();
            } 
            // 🔒 REGLA 3: SI LA CUENTA NO EXISTE EN LA SHEET -> Validamos si viene de Red Social para activarlo de inmediato
            else if (data.estado_cuenta === "inexistente") {
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (session && session.user && (session.user.app_metadata.provider === 'google' || session.user.app_metadata.provider === 'facebook')) {
                    console.log("Interesado validado por Red Social (" + session.user.app_metadata.provider + "). Registrando en Sheets como 'activo' de forma automatizada...");
                    const nombreOAuth = session.user.user_metadata.full_name || "Usuario Red Social";
                    
                    // Alta inmediata automática con estado 'activo' para Google o Facebook
                    guardarUsuarioEnGoogleSheets(emailUsuario, "activo", nombreOAuth);
                } else {
                    // Si no es red social (es decir, limpió la caché o es un correo eliminado), se le mantiene en modo visitante básico
                    console.log("Visitante libre navegando sin credenciales comerciales activas.");
                    await forzarCierreDeInterfazPorSeguridad();
                }
            }
            // SI ESTÁ PENDIENTE U OTRO ESTADO
            else {
                await forzarCierreDeInterfazPorSeguridad();
            }
        })
        .catch(async () => {
            await forzarCierreDeInterfazPorSeguridad();
        });
    }


        
        function guardarUsuarioEnGoogleSheets(emailUsuario, estadoInicial = "pendiente", nombreCompleto = "") {
        // Enviamos el correo, el estado ("activo" para redes, "pendiente" para email) y el nombre capturado de Google/Facebook
        fetch(urlMiScriptGoogle, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ 
                accion: "registrar_usuario", 
                email: emailUsuario,
                estado: estadoInicial,
                nombre: nombreCompleto
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log("Sincronización con Sheets completada de forma segura:", data);
            // Si acabamos de registrar a alguien activo por Google/Facebook, refrescamos los datos comerciales en pantalla
            if (estadoInicial === "activo") {
                verificarEstadoYRolUsuario(emailUsuario);
            }
        })
        .catch(err => console.error("Error al registrar en Sheets:", err));
    }

    // 🌟 PERSISTENCIA EN TIEMPO REAL: Guarda y borra me gustas directamente de tu Google Sheets
    function alternarFavoritoReal(idPropiedad) {
        if (!usuarioAutenticado) {
            abrirVentanaLogin();
            return;
        }

        const propIdStr = idPropiedad.toString();
        
        // Optimistic UI: Cambiamos el color de inmediato en la pantalla para una experiencia veloz
        const idx = favoritosUsuario.indexOf(propIdStr);
        if (idx === -1) {
            favoritosUsuario.push(propIdStr);
        } else {
            favoritosUsuario.splice(idx, 1);
        }
        renderizarMapaZillow();

        // Mandamos la orden de escritura a la tabla 'favorito' de Sheets de manera silenciosa
        fetch(urlMiScriptGoogle, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
                accion: "alternar_favorito",
                email: correoUsuarioLogueado,
                propiedad_id: propIdStr
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log("Sincronización de favorito exitosa:", data.resultado);
        })
        .catch(err => console.error("Error al guardar favorito:", err));
    }

    // =========================================================================
    // CONTROLADOR DE ACCESO INTELIGENTE (EMAIL / CONTRASEÑA)
    // =========================================================================
    async function procesarAccesoUsuario() {
        const email = document.getElementById('input-usuario-email').value.trim();
        const pass = document.getElementById('input-usuario-pass').value.trim();

        if (!email || !pass) {
            alert("Completa todos los campos obligatorios (*)");
            return;
        }

        try {
            // 1. Intentamos iniciar sesión de forma directa en Supabase
            const { data: dataLogin, error: errorLogin } = await supabaseClient.auth.signInWithPassword({ 
                email: email, 
                password: pass 
            });

            if (!errorLogin && dataLogin.user) {
                // Éxito: Sincronizamos y activamos automáticamente si estaba pendiente
                verificarEstadoYRolUsuario(email);
                return;
            }

            // 2. Evaluamos si es un usuario que ya existe pero no ha confirmado su correo
            if (errorLogin && errorLogin.message.includes("Email not confirmed")) {
                alert("Tu registro está pendiente. Por favor, revisa tu bandeja de entrada y confirma tu correo electrónico para ingresar.");
                return;
            }

            // 3. FLUJO DE AUTORREGISTRO EN PARALELO ANTES DE SUPABASE (POR EMAIL VA A PENDIENDE)
            if (errorLogin && (errorLogin.message.includes("Invalid login credentials") || errorLogin.status === 400)) {
                
                // Registro inicial manual entra como 'pendiente' de validación de enlace
                guardarUsuarioEnGoogleSheets(email, "pendiente", "");
                
                alert("¡Datos registrados en el sistema!\nHemos guardado tus datos en estado 'pendiente'. Ahora procederemos a solicitar el envío del enlace de confirmación a tu correo electrónico.");

                // Ahora sí, llamamos a Supabase de forma segura para despachar el link oficial
                const { data: dataRegistro, error: errorRegistro } = await supabaseClient.auth.signUp({
                    email: email,
                    password: pass,
                    options: { redirectTo: 'https://github.io' }
                });

                if (errorRegistro) {
                    console.error("Aviso de Supabase Auth:", errorRegistro.message);
                    alert("Nota: El servidor de correos está saturado en este momento. Tu cuenta ya figura como 'pendiente' en el sistema, un administrador la revisará o puedes reintentar confirmar más tarde.");
                }

                cerrarVentanaLogin();
            } else {
                throw errorLogin;
            }

        } catch (error) {
            alert("Error en el sistema de accesos: " + error.message);
        }
    }

    async function forzarCierreDeInterfazPorSeguridad() {
        usuarioAutenticado = false;
        correoUsuarioLogueado = "";
        favoritosUsuario = [];
        renderizarMapaZillow();
        
        try {
            await supabaseClient.auth.signOut();
            localStorage.clear();
            sessionStorage.clear();
        } catch (e) {
            console.log("Sesión de Supabase ya limpia o inexistente.");
        }
    }

    function abrirVentanaLogin() {
        if (usuarioAutenticado) return;
        document.getElementById('mi-modal-login').style.display = 'flex';
    }

    function cerrarVentanaLogin() {
        document.getElementById('mi-modal-login').style.display = 'none';
    }
</script>
