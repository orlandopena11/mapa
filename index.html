<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador Inmobiliario - Estilo Zillow</title>
    <!-- 🟢 CONECTADO A JSDELIVR: Servidor oficial de alta confianza que el navegador acepta sin bloqueos MIME -->
    <link rel="stylesheet" href="https://jsdelivr.net" />
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; overflow: hidden; background-color: #ffffff; }
        #wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #barra-filtros { display: flex; align-items: center; gap: 12px; padding: 12px 24px; border-bottom: 1px solid #e1e4e8; background: #ffffff; height: 64px; box-sizing: border-box; z-index: 1000; }
        .logo-simulado { font-size: 22px; font-weight: 800; color: #006aff; letter-spacing: -1px; margin-right: 20px; }
        .btn-filtro { padding: 8px 16px; border: 1px solid #b2b4b7; background: #ffffff; color: #2a2a2a; border-radius: 4px; font-weight: 600; font-size: 14px; cursor: pointer; transition: border-color 0.2s; }
        .btn-filtro:hover { border-color: #006aff; color: #006aff; }
        .btn-buscar { background: #006aff; color: #ffffff; border: none; padding: 10px 24px; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; margin-left: auto; }
        #contenedor-principal { display: flex; height: calc(100vh - 64px); width: 100vw; overflow: hidden; }
        
        /* Contenedor del mapa real con dimensiones explícitas */
        #mapa-real { width: 60%; height: 100%; display: block; background-color: #cbdbe5; z-index: 1; position: relative; }
        
        #panel-lateral { width: 40%; height: 100%; overflow-y: auto; background-color: #ffffff; box-sizing: border-box; padding: 20px; border-left: 1px solid #e1e4e8; z-index: 2; }
        .grid-propiedades { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .tarjeta-casa { background: white; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); border: 1px solid #e1e4e8; overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s; position: relative; }
        .tarjeta-casa:hover { border-color: #006aff; transform: translateY(-2px); }
        .tarjeta-activa { border-color: #006aff !important; background-color: #f0f6ff; box-shadow: 0 4px 12px rgba(0,106,255,0.15); }
        .info { padding: 16px; }
        .precio { font-size: 24px; font-weight: 800; margin: 0; color: #2a2a2a; }
        .detalles { color: #2a2a2a; font-size: 14px; font-weight: 700; margin: 6px 0; }
        .detalles span { color: #626469; font-weight: 400; padding: 0 4px; }
        .dir { color: #626469; font-size: 13px; margin: 6px 0 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Pines de Precios estilo Zillow */
        .pin-precio { background-color: #ff385c; color: white; padding: 5px 11px; border-radius: 20px; font-weight: bold; font-size: 12px; border: 2px solid white; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.3); white-space: nowrap; cursor: pointer; transition: background-color 0.2s, transform 0.2s; }
        .pin-precio:hover { background-color: #006aff; transform: scale(1.1); }
        .pin-activo { background-color: #006aff !important; z-index: 9999 !important; }
        .leaflet-div-icon { background: none !important; border: none !important; }
    </style>
</head>
<body>

    <div id="wrapper">
        <div id="barra-filtros">
            <div class="logo-simulado">SurcoPro</div>
            <button class="btn-filtro">For sale</button>
            <button class="btn-filtro" id="filtro-precio">Price</button>
            <button class="btn-filtro" id="filtro-hab">Beds & baths</button>
            <button class="btn-filtro">Property type</button>
            <button class="btn-buscar">Save search</button>
        </div>

        <div id="contenedor-principal">
            <div id="mapa-real"></div>
            <div id="panel-lateral">
                <div class="grid-propiedades" id="lista-propiedades">
                    
                    <div class="tarjeta-casa" id="tarjeta-1" onclick="seleccionarDesdeLista(1, -12.0984, -76.9692)">
                        <div class="info">
                            <p class="precio">$320,000</p>
                            <p class="detalles">3<span>bds</span> | 3<span>ba</span> | 150<span>m²</span> | House for sale</p>
                            <p class="dir">Av. El Polo 456, Urb. El Derby, Surco</p>
                        </div>
                    </div>

                    <div class="tarjeta-casa" id="tarjeta-2" onclick="seleccionarDesdeLista(2, -12.1125, -76.9781)">
                        <div class="info">
                            <p class="precio">$450,000</p>
                            <p class="detalles">4<span>bds</span> | 4<span>ba</span> | 240<span>m²</span> | House for sale</p>
                            <p class="dir">Calle Las Camelias 123, Urb. Chacarilla, Surco</p>
                        </div>
                    </div>

                    <div class="tarjeta-casa" id="tarjeta-3" onclick="seleccionarDesdeLista(3, -12.1256, -77.0302)">
                        <div class="info">
                            <p class="precio">$280,000</p>
                            <p class="detalles">2<span>bds</span> | 2<span>ba</span> | 110<span>m²</span> | Apartment for sale</p>
                            <p class="dir">Av. Larco 789, Miraflores, Lima</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- 🟢 CONECTADO A JSDELIVR: Se descarga instantáneamente sin pasar jamás por Cloudflare -->
    <script src="https://jsdelivr.net"></script>
    
    <script>
        // Inicializar mapa dinámico real centrado en Surco
        const mapa = L.map('mapa-real', { zoomControl: false }).setView([-12.1125, -76.9781], 13);
        L.control.zoom({ position: 'bottomright' }).addTo(mapa);
        
        // Proveedor universal de OpenStreetMap estándar
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(mapa);

        const propiedadesLocales = [
            { id: 1, texto: "$320K", lat: -12.0984, lng: -76.9692, titulo: "Departamento El Polo" },
            { id: 2, texto: "$450K", lat: -12.1125, lng: -76.9781, titulo: "Penthouse Chacarilla" },
            { id: 3, texto: "$280K", lat: -12.1256, lng: -77.0302, titulo: "Flat Larco" }
        ];

        // Pintar las etiquetas de precios
        propiedadesLocales.forEach(casa => {
            const miIcono = L.divIcon({
                html: `<div class="pin-precio" id="pin-${casa.id}" onclick="seleccionarProperty(${casa.id})">${casa.texto}</div>`
            });
            L.marker([casa.lat, casa.lng], { icon: miIcono }).addTo(mapa);
        });

        // Asegurar tamaño del lienzo
        setTimeout(() => { mapa.invalidateSize(); }, 400);

        function seleccionarProperty(id) { destacarElemento(id); }
        function seleccionarDesdeLista(id, lat, lng) { destacarElemento(id); mapa.setView([lat, lng], 15, { animate: true }); }

        function destacarElemento(id) {
            document.querySelectorAll('.pin-precio').forEach(p => p.classList.remove('pin-activo'));
            document.querySelectorAll('.tarjeta-casa').forEach(t => t.classList.remove('tarjeta-activa'));
            const tarjeta = document.getElementById('tarjeta-' + id);
            const pin = document.getElementById('pin-' + id);
            if(pin) pin.classList.add('pin-activo');
            if(tarjeta) { 
                tarjeta.classList.add('tarjeta-activa'); 
                tarjeta.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); 
            }
        }

        // Filtros
        document.getElementById('filtro-hab').onclick = function() {
            const habRequeridas = prompt("Beds & Baths - Introduce el número mínimo de dormitorios:", "3");
            if (!habRequeridas) return;
            const num = parseInt(habRequeridas);
            filtrarElemento(1, 3 >= num); filtrarElemento(2, 4 >= num); filtrarElemento(3, 2 >= num);
        };

        document.getElementById('filtro-precio').onclick = function() {
            const precioMaximo = prompt("Price - Introduce tu presupuesto máximo en dólares:", "400000");
            if (!precioMaximo) return;
            const max = parseInt(precioMaximo);
            filtrarElemento(1, 320000 <= max); filtrarElemento(2, 450000 <= max); filtrarElemento(3, 280000 <= max);
        };

        function filtrarElemento(id, condicion) {
            const tarjeta = document.getElementById('tarjeta-' + id);
            const pin = document.getElementById('pin-' + id);
            const style = condicion ? "block" : "none";
            if (tarjeta) tarjeta.style.display = style;
            if (pin) pin.parentElement.style.display = style;
        }
    </script>
</body>
</html>
